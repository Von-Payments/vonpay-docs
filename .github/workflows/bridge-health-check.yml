name: Bridge health check

on:
  schedule:
    - cron: '0 * * * *'  # hourly
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install minimal deps
        run: npm i --no-save @supabase/supabase-js@^2.45.0

      - name: Check bridge_health.last_regen_at
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const c = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY, { auth: { persistSession: false } });
          c.from('bridge_health').select().eq('id', 1).single().then(({ data, error }) => {
            if (error) { console.error('health query failed:', error.message); process.exit(2); }
            const last = data.last_regen_at ? new Date(data.last_regen_at) : null;
            const ageMs = last ? Date.now() - last.getTime() : Infinity;
            const ageHours = ageMs / 1000 / 60 / 60;
            console.log('last_regen_at:', data.last_regen_at, 'age:', ageHours.toFixed(2), 'h');
            if (ageHours > 26) {
              console.error('STALE: bridge regen has not run in', ageHours.toFixed(2), 'hours');
              // Surface to GitHub Actions log + non-zero exit so workflow status reflects health
              process.exit(1);
            }
          });
          "
